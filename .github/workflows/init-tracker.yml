name: Initialize New Tracker

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Tracker slug (kebab-case, e.g., myanmar-coup)'
        required: true
      topic:
        description: 'What this tracker covers (natural language description)'
        required: true
      start_date:
        description: 'Timeline start date (YYYY-MM-DD)'
        required: true
      region:
        description: 'Geographic focus (e.g., Myanmar/Southeast Asia)'
        required: true
      auto_seed:
        description: 'Automatically trigger seed-tracker.yml after init'
        required: false
        default: 'true'
      domain:
        description: 'Domain category (conflict, security, governance, disaster, human-rights, science, space, economy, culture, history)'
        required: false
      country:
        description: 'ISO 3166-1 alpha-2 country code (e.g., MX, US, UA)'
        required: false
      series_id:
        description: 'Series ID to group related trackers (e.g., mx-presidencies, bts)'
        required: false
      series_name:
        description: 'Series display name (e.g., Mexican Presidencies)'
        required: false
      series_order:
        description: 'Position within series (integer, chronological order)'
        required: false
      is_hub:
        description: 'Is this the hub/overview tracker for its series? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      created: ${{ steps.changes.outputs.changed }}
      built: ${{ steps.build_test.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tracker does not already exist
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ -d "trackers/${SLUG}" ]; then
            echo "ERROR: trackers/${SLUG}/ already exists. Use seed-tracker.yml to populate existing trackers."
            exit 1
          fi
          # Validate slug format
          if ! echo "$SLUG" | grep -qE '^[a-z0-9-]+$'; then
            echo "ERROR: slug must be kebab-case (lowercase letters, numbers, hyphens only)"
            exit 1
          fi
          echo "Tracker slug '${SLUG}' is available"

      - name: Initialize tracker with Claude Code
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are initializing a NEW tracker for the Watchboard intelligence dashboard platform.

            TRACKER DETAILS:
            - Slug: ${{ github.event.inputs.slug }}
            - Topic: ${{ github.event.inputs.topic }}
            - Start date: ${{ github.event.inputs.start_date }}
            - Geographic region: ${{ github.event.inputs.region }}
            - Domain: ${{ github.event.inputs.domain || 'auto-detect from topic' }}
            - Country: ${{ github.event.inputs.country || 'auto-detect from region' }}
            - Series ID: ${{ github.event.inputs.series_id || 'none' }}
            - Series Name: ${{ github.event.inputs.series_name || 'none' }}
            - Series Order: ${{ github.event.inputs.series_order || 'none' }}
            - Is Hub: ${{ github.event.inputs.is_hub || 'false' }}

            ══════════════════════════════════════════════
            STEP 1 — STUDY EXISTING TRACKERS AS EXAMPLES
            ══════════════════════════════════════════════

            Read these files to understand the patterns and ALL required fields:
            1. src/lib/tracker-config.ts — TrackerConfigSchema (every required and optional field)
            2. src/lib/schemas.ts — data schemas for every section (MetaSchema is critical)
            3. trackers/iran-conflict/tracker.json — example: military conflict tracker (all 9 sections)
            4. trackers/ayotzinapa/tracker.json — example: human rights investigation (6 sections)

            Understand the FULL TrackerConfigSchema before generating anything.

            ══════════════════════════════════════════════
            STEP 2 — GENERATE tracker.json
            ══════════════════════════════════════════════

            Create trackers/${{ github.event.inputs.slug }}/tracker.json with ALL required fields.

            CRITICAL DECISIONS (based on the topic — do NOT copy-paste from Iran):

            - slug: "${{ github.event.inputs.slug }}"
            - name: A descriptive tracker name
            - shortName: Short version for page titles
            - description: 1-2 sentence description
            - icon: An appropriate emoji
            - color: A hex color fitting the topic
            - status: "active"
            - startDate: "${{ github.event.inputs.start_date }}"

            TAXONOMY FIELDS (new — read DomainSchema, RegionSchema, SeriesSchema in tracker-config.ts):
            - domain: Use the provided value, or infer from the topic. Must be one of the DomainSchema enum values.
            - region: Infer from the geographic region. Must be one of the RegionSchema enum values (e.g., "north-america", "middle-east", "global").
            - country: Use the provided ISO code, or infer from the region (e.g., "MX", "US", "UA").
            - tags: Optional array of freeform strings for cross-cutting classification.
            - series: If a Series ID was provided, include: { "id": "<series_id>", "name": "<series_name>", "order": <series_order or omit>, "isHub": <true if is_hub> }.
              If no series was provided, omit this field.
            - related: Omit for now (will be wired after all trackers are created).

            - sections: Choose ONLY from these EXACT valid section IDs (case-sensitive):
              "hero", "kpis", "timeline", "map", "military", "casualties", "economic", "claims", "political"
              Military conflict → all 9. Investigation → skip military/casualties/economic.
              Humanitarian crisis → include casualties, skip military. Always include hero, kpis, timeline.
              DO NOT use any other strings — "economy", "mil", "casualty" etc. will fail validation.

            - map.enabled: true
            - map.bounds: Research the correct geographic bounds for "${{ github.event.inputs.region }}".
              Use real coordinates (lonMin, lonMax, latMin, latMax).
            - map.center: Center point of the region (lon, lat).
            - map.categories: Create 3-5 categories SPECIFIC to this topic. Use meaningful IDs and labels.
              For a coup: regime-action, protest, arrest, humanitarian.
              For a disaster: impact-zone, shelter, aid-distribution, infrastructure.

            - globe.enabled: true
            - globe.cameraPresets: Create 4-6 presets with REAL coordinates for key locations.
              Include a wide overview preset and specific site presets.
              Each needs: lon, lat, alt, pitch (-90), heading (0), label.
              Search the web for exact coordinates of important locations.

            - navSections: Match enabled sections with appropriate nav labels.

            - politicalAvatars: 4-6 avatar categories for this topic's factions/actors.
            - eventTypes: 3-5 event type categories relevant to this topic.

            - ai.systemPrompt: Write a CUSTOM prompt tailored to this topic.
              Define the role (conflict analyst, human rights researcher, etc.).
              Define source tiers specific to this domain:
                Tier 1: Official/primary sources for this topic
                Tier 2: Major outlets covering this topic
                Tier 3: Institutional/analytical sources
                Tier 4: Unverified/social media
              Include these rules (required):
                - "Your entire response must be ONLY a raw JSON array or object"
                - "Every item must have an \"id\" field (lowercase_snake_case)"
                - "Only include information you can verify through search results"
              Use template variable {{today}} for today's date.

            - ai.searchContext: Concise search query for this topic.
            - ai.enabledSections: Match sections that should be auto-updated.
            - ai.coordValidation: Match or slightly expand the map.bounds.
            - ai.updateIntervalDays: 1 for active events, 7 for slow-moving, 30+ for cold cases.
            - ai.backfillTargets: Appropriate minimum counts per section (timeline: 20-40, mapPoints: 10-30, claims: 10-20, political: 10-20, kpis: 6-10).

            ══════════════════════════════════════════════
            STEP 3 — CREATE DATA DIRECTORY AND FILES
            ══════════════════════════════════════════════

            Create the data directory and ALL required files:

            1. Create directory: trackers/${{ github.event.inputs.slug }}/data/events/
               (use mkdir -p)

            2. Create trackers/${{ github.event.inputs.slug }}/data/meta.json:
               {
                 "operationName": "<short operation name>",
                 "dayCount": <days from start_date to today>,
                 "dateline": "<today's date, e.g., 17 MAR 2026>",
                 "heroHeadline": "<initial headline about this topic>",
                 "heroSubtitle": "<brief current status>",
                 "footerNote": "Data sourced from official reports, major outlets, and institutional analyses.",
                 "lastUpdated": "<current ISO timestamp>"
               }

            3. Create trackers/${{ github.event.inputs.slug }}/data/update-log.json:
               { "lastRun": "<current ISO timestamp>", "tracker": "${{ github.event.inputs.slug }}", "sections": {} }

            4. Create ALL these files with empty arrays []:
               - kpis.json
               - timeline.json
               - map-points.json
               - map-lines.json
               - claims.json
               - political.json
               - casualties.json
               - econ.json
               - strike-targets.json
               - retaliation.json
               - assets.json

            ══════════════════════════════════════════════
            STEP 4 — VALIDATE
            ══════════════════════════════════════════════

            1. Read back tracker.json and verify valid JSON with all required fields
            2. Verify all data files exist and contain valid JSON
            3. Print a summary:
               - Tracker name and slug
               - Enabled sections
               - Map categories
               - Globe presets
               - Update interval
               - Number of data files created

            IMPORTANT: Do NOT commit or push. The workflow handles that.
            IMPORTANT: Do NOT seed/populate data. The seed-tracker workflow handles that separately.
          claude_args: "--max-turns 40 --dangerously-skip-permissions"

      - name: Check for changes
        id: changes
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ ! -d "trackers/${SLUG}" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ERROR: tracker directory was not created"
            exit 1
          fi
          git add "trackers/${SLUG}/"
          if git diff --cached --quiet "trackers/${SLUG}/"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "=== Files created ==="
            git diff --cached --name-only "trackers/${SLUG}/"
          fi

      - name: Validate JSON syntax
        id: json_check
        if: steps.changes.outputs.changed == 'true'
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          invalid=0
          for f in $(find "trackers/${SLUG}" -name '*.json' -type f); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "INVALID JSON: $f"
              invalid=$((invalid + 1))
            fi
          done
          if [ "$invalid" -gt 0 ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "$invalid file(s) failed JSON validation"
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "All JSON files valid"
          fi

      - name: Validate tracker config schema
        id: config_check
        if: steps.changes.outputs.changed == 'true' && steps.json_check.outputs.valid == 'true'
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          npx tsx -e "
          import { TrackerConfigSchema } from './src/lib/tracker-config.js';
          import fs from 'fs';
          const raw = JSON.parse(fs.readFileSync('trackers/${SLUG}/tracker.json', 'utf8'));
          const result = TrackerConfigSchema.safeParse(raw);
          if (result.success) {
            console.log('✓ tracker.json passes TrackerConfigSchema');
          } else {
            console.error('✗ tracker.json failed validation:');
            for (const err of result.error.errors) {
              console.error('  ', err.path.join('.'), ':', err.message);
            }
            process.exit(1);
          }
          "
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Build test
        id: build_test
        if: steps.changes.outputs.changed == 'true' && steps.config_check.outputs.valid == 'true'
        run: |
          npm run build 2>&1 | tail -20
          echo "build=true" >> $GITHUB_OUTPUT

      - name: Update README tracker index
        if: steps.changes.outputs.changed == 'true' && steps.build_test.outputs.build == 'true'
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          REGION="${{ github.event.inputs.region }}"
          node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('trackers/${SLUG}/tracker.json', 'utf8'));
          const name = config.name;
          let desc = config.description;
          if (desc.length > 80) desc = desc.slice(0, 80) + '...';
          const sections = config.sections.length;
          const globe = config.globe?.enabled ? '3D' : '—';
          const base = 'https://artemiopadilla.github.io/watchboard';
          const row = '| **[' + name + '](' + base + '/${SLUG}/)** | ' + desc + ' | ' + sections + ' | ' + '${REGION}' + ' | ' + globe + ' |';
          const readme = fs.readFileSync('README.md', 'utf8');
          const lines = readme.split('\n');
          let lastRowIdx = -1;
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('| **[')) lastRowIdx = i;
          }
          if (lastRowIdx >= 0) {
            lines.splice(lastRowIdx + 1, 0, row);
            fs.writeFileSync('README.md', lines.join('\n'));
            console.log('Added ' + name + ' to README after line ' + (lastRowIdx + 1));
          } else {
            console.log('WARNING: Could not find tracker table in README.md');
          }
          "

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && steps.build_test.outputs.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          REGION="${{ github.event.inputs.region }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          for i in $(seq 1 10); do
            # Abort any in-progress rebase from prior attempt
            git rebase --abort 2>/dev/null || true

            # Pull latest main
            git checkout main 2>/dev/null || true
            git pull origin main --rebase=false 2>/dev/null || true

            # Re-generate README row on the fresh base
            node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('trackers/${SLUG}/tracker.json', 'utf8'));
            const name = config.name;
            let desc = config.description;
            if (desc.length > 80) desc = desc.slice(0, 80) + '...';
            const sections = config.sections.length;
            const globe = config.globe?.enabled ? '3D' : '—';
            const base = 'https://artemiopadilla.github.io/watchboard';
            const row = '| **[' + name + '](' + base + '/${SLUG}/)** | ' + desc + ' | ' + sections + ' | ' + '${REGION}' + ' | ' + globe + ' |';
            const readme = fs.readFileSync('README.md', 'utf8');
            if (readme.includes('/${SLUG}/')) { console.log('Already in README'); process.exit(0); }
            const lines = readme.split('\\\n');
            let lastRowIdx = -1;
            for (let i = 0; i < lines.length; i++) { if (lines[i].startsWith('| **[')) lastRowIdx = i; }
            if (lastRowIdx >= 0) { lines.splice(lastRowIdx + 1, 0, row); fs.writeFileSync('README.md', lines.join('\\\n')); }
            "

            # Stage and commit
            git add "trackers/${SLUG}/" README.md
            git diff --cached --quiet && echo "Nothing to commit" && break
            git commit -m "feat(tracker): initialize ${SLUG} tracker $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true

            # Push — if it works, done
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi

            echo "Push attempt $i failed, retrying with jitter..."
            sleep $(( (RANDOM % 5) + 2 ))
          done

      - name: Job summary
        if: always()
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          echo "## 🚀 Init Tracker Report — ${SLUG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Topic**: ${{ github.event.inputs.topic }}" >> $GITHUB_STEP_SUMMARY
          echo "**Start date**: ${{ github.event.inputs.start_date }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region**: ${{ github.event.inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "**Auto-seed**: ${{ github.event.inputs.auto_seed }}" >> $GITHUB_STEP_SUMMARY
          echo "**Domain**: ${{ github.event.inputs.domain || 'auto-detected' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Series**: ${{ github.event.inputs.series_id || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CONFIG="trackers/${SLUG}/tracker.json"
          if [ -f "$CONFIG" ]; then
            echo "### Generated Config" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            SECTIONS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$CONFIG','utf8')).sections.join(', '))}catch{console.log('error')}")
            STATUS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$CONFIG','utf8')).status)}catch{console.log('error')}")
            GLOBE=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$CONFIG','utf8')).globe?.enabled?'Yes':'No')}catch{console.log('error')}")
            INTERVAL=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$CONFIG','utf8')).ai?.updateIntervalDays||'?')}catch{console.log('error')}")
            CATS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$CONFIG','utf8')).map?.categories?.map(c=>c.id).join(', ')||'none')}catch{console.log('error')}")
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Sections | ${SECTIONS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Globe | ${GLOBE} |" >> $GITHUB_STEP_SUMMARY
            echo "| Update interval | ${INTERVAL} days |" >> $GITHUB_STEP_SUMMARY
            echo "| Map categories | ${CATS} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Build**: ${{ steps.build_test.outputs.build == 'true' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
            echo "**Auto-seed job**: ${{ github.event.inputs.auto_seed == 'true' && '⏳ Will run next' || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **tracker.json was not created**" >> $GITHUB_STEP_SUMMARY
          fi

  seed:
    needs: init
    if: github.event.inputs.auto_seed == 'true' && needs.init.outputs.created == 'true' && needs.init.outputs.built == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify tracker exists after init
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          if [ ! -f "trackers/${SLUG}/tracker.json" ]; then
            echo "ERROR: trackers/${SLUG}/tracker.json not found after init job"
            exit 1
          fi
          echo "Tracker ${SLUG} found, proceeding with seed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed tracker with Claude Code
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot]"
          prompt: |
            You are performing a COMPREHENSIVE HISTORICAL BACKFILL for the Watchboard intelligence tracker: ${{ github.event.inputs.slug }}

            This is NOT a nightly "latest news" update. You are populating a tracker with DEEP HISTORICAL DATA spanning its entire timeline. Research thoroughly and extensively.

            SECTIONS TO BACKFILL: all

            STEP 1 — READ SCHEMAS AND CONFIG

            1. Read src/lib/schemas.ts — ALL data schemas.
            2. Read trackers/${{ github.event.inputs.slug }}/tracker.json — config with enabledSections, backfillTargets, searchContext, systemPrompt, coordValidation, map.categories, politicalAvatars, eventTypes.
            3. Read ALL existing data files in trackers/${{ github.event.inputs.slug }}/data/ and count items.

            STEP 2 — PLAN YOUR RESEARCH

            Based on the tracker config, plan research across the full timeline (from startDate to today). Identify key eras, actors, locations, contested claims, and quantitative data.

            STEP 3 — RESEARCH AND POPULATE EACH SECTION

            For each enabled section: deep web searches, generate items conforming to schemas, merge with existing data, write files, verify JSON.

            RULES:
            - CRITICAL DATE RULE: Today is $(date -u +%Y-%m-%d). Do NOT create events, match results, or outcomes for dates after today. For trackers covering future events (e.g., World Cup 2026), only populate verifiable past data (qualification results, venue announcements, draw results). Scheduled future events should be noted as "SCHEDULED" or "PLANNED", never as completed.
            - Every item MUST have a unique "id" field (lowercase-kebab-case)
            - MERGE-BY-ID: read existing data first, APPEND new items, never remove existing
            - Follow source tier rules from the tracker's ai.systemPrompt
            - Set "lastUpdated" on every new item
            - Validate coordinates within ai.coordValidation bounds
            - Write JSON with 2-space indent
            - After writing each file, read it back to verify valid JSON

            SECTION GUIDANCE:
            - timeline.json: Array of TimelineEra objects with events. Cover FULL timeline. Aim for backfillTargets.timeline events.
            - map-points.json: Real coordinates within bounds. Use tracker's map.categories for cat field.
            - claims.json: Both sides substantive. Cover all major contested narratives.
            - political.json: Key actors across all sides. Use tracker's politicalAvatars. Real quotes.
            - kpis.json: Most important quantitative metrics.
            - casualties.json, econ.json: Only if relevant to topic.
            - meta.json: Update dayCount, dateline, heroHeadline, lastUpdated.
            - update-log.json: Write with current timestamp and section item counts.

            STEP 4 — VERIFY

            Read back every file, count items vs backfillTargets, print summary table.

            IMPORTANT: Do NOT commit or push. The workflow handles that.
          claude_args: "--max-turns 80 --dangerously-skip-permissions"

      - name: Check for changes
        id: seed_changes
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          git add "trackers/${SLUG}/"
          if git diff --cached --quiet "trackers/${SLUG}/"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes from seed"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Seed produced changes"
          fi

      - name: Validate JSON syntax
        id: seed_json
        if: steps.seed_changes.outputs.changed == 'true'
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          invalid=0
          for f in $(find "trackers/${SLUG}" -name '*.json' -path '*/data/*' -type f); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "INVALID JSON: $f"
              invalid=$((invalid + 1))
            fi
          done
          if [ "$invalid" -gt 0 ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
          else
            echo "valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.seed_changes.outputs.changed == 'true' && steps.seed_json.outputs.valid == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "trackers/${SLUG}/"
          git commit -m "chore(data): seed ${SLUG} tracker data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in $(seq 1 10); do
            git pull --rebase origin main && git push && echo "Push succeeded on attempt $i" && break
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed, retrying with jitter..."
            sleep $(( (RANDOM % 5) + 2 ))
          done

      - name: Seed summary
        if: always()
        run: |
          SLUG="${{ github.event.inputs.slug }}"
          echo "## 🌱 Auto-Seed Report — ${SLUG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          DIR="trackers/${SLUG}/data"
          if [ -d "$DIR" ]; then
            echo "| Section | Items |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            for file in kpis timeline map-points map-lines claims political casualties econ; do
              FILE="$DIR/${file}.json"
              if [ -f "$FILE" ]; then
                COUNT=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$FILE','utf8')).length)}catch{console.log(0)}")
                SECTION=$(echo "$file" | sed 's/-/ /g')
                echo "| ${SECTION} | ${COUNT} |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi
