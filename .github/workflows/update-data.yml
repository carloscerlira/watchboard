name: Nightly Data Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      sections:
        description: 'Sections to update (comma-separated, or "all")'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update data with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the nightly data updater for the Iran Conflict Tracker dashboard.

            Your job: search the web for the latest Iran-US/Israel conflict developments
            and update the JSON data files in src/data/.

            INSTRUCTIONS:
            1. Read src/lib/schemas.ts to understand all data schemas
            2. Read scripts/update-data.ts to understand the SYSTEM_PROMPT, section structure, and merge-by-ID pattern
            3. Read the current data files in src/data/ to see existing entries
            4. Search the web for the latest developments (today and recent days)
            5. Update each section following the exact schema shapes:
               - src/data/kpis.json (key metrics)
               - src/data/timeline.json (historical eras/phases)
               - src/data/events/*.json (daily event files, named YYYY-MM-DD.json)
               - src/data/map-points.json (geographic points of interest)
               - src/data/map-lines.json (strike/retaliation arcs with weapon data)
               - src/data/strike-targets.json (strike target details)
               - src/data/retaliation.json (retaliation actions)
               - src/data/assets.json (military assets)
               - src/data/casualties.json (casualty figures)
               - src/data/econ.json (economic indicators)
               - src/data/claims.json (claims from different parties)
               - src/data/political.json (political developments)
               - src/data/meta.json (last updated timestamp)

            RULES:
            - Use merge-by-ID: never remove existing entries, only add new or update existing
            - Every entry needs an `id` field (kebab-case, descriptive)
            - Tag sources with tier (1-4) and pole (western/middle_eastern/eastern/international)
            - Use OSINT confirmation: 1 Tier-1 or 2+ Tier-2 sources = confirmed
            - Validate coordinates are within theater bounds (lon 25-65°E, lat 20-42°N)
            - Set `lastUpdated` on modified entries
            - Create new daily event file if today's doesn't exist
            - Casualty `contested` field: yes/no/evolving/heavily/partial
            - Update meta.json with current timestamp

            After updating, verify the changes by reading back modified files to confirm valid JSON.
          claude_args: "--max-turns 50 --model claude-sonnet-4-6 --allowedTools WebSearch,WebFetch,Read,Edit,Write,Glob,Grep,Bash"

      - name: Check for changes
        id: changes
        run: |
          git add src/data/
          git diff --cached --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/
          git commit -m "chore(data): nightly AI update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry up to 3 times in case remote has new commits
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
